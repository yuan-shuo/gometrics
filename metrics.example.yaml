# metrics.example.yaml - gometrics 示例配置文件
# 用于生成 Prometheus 指标代码

# 服务名称，将作为指标的 namespace
service_name: "my-service"

# 子系统列表
subsystems:
  # 订单子系统
  - name: "order"
    counters:
      # 订单创建总数
      - name: "orders_created_total"
        help: "Total number of orders created"
        labels: ["status", "channel"]
        methods: ["inc"]
      
      # 订单失败总数
      - name: "orders_failed_total"
        help: "Total number of orders failed"
        labels: ["reason", "channel"]
        methods: ["inc"]
      
      # 请求字节数（支持 Add 方法）
      - name: "request_bytes_total"
        help: "Total request bytes"
        labels: ["method"]
        methods: ["add"]
    
    gauges:
      # 活跃连接数
      - name: "active_connections"
        help: "Current active connections"
        labels: ["pool"]
        methods: ["set", "inc", "dec"]
      
      # 队列深度
      - name: "queue_depth"
        help: "Current queue depth"
        labels: ["queue_name"]
        methods: ["set"]
    
    histograms:
      # 请求延迟（毫秒）
      - name: "request_latency_ms"
        help: "Request latency in milliseconds"
        labels: ["method", "path"]
        buckets: [10, 50, 100, 200, 500, 1000, 2000]
        methods: ["observe"]
      
      # 数据库查询耗时（毫秒）
      - name: "db_query_duration_ms"
        help: "Database query duration in milliseconds"
        labels: ["operation", "table"]
        buckets: [5, 10, 25, 50, 100, 250, 500]
        methods: ["observe"]

  # 用户子系统
  - name: "user"
    counters:
      # 用户注册总数
      - name: "registrations_total"
        help: "Total number of user registrations"
        labels: ["source"]
        methods: ["inc"]
      
      # 登录失败次数
      - name: "login_failures_total"
        help: "Total number of login failures"
        labels: ["reason"]
        methods: ["inc"]
    
    gauges:
      # 在线用户数
      - name: "online_users"
        help: "Current number of online users"
        labels: []
        methods: ["set"]
    
    histograms:
      # 登录耗时
      - name: "login_duration_ms"
        help: "Login operation duration in milliseconds"
        labels: ["auth_type"]
        buckets: [10, 25, 50, 100, 250]
        methods: ["observe"]
